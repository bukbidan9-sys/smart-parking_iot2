<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin — Smart Parking Kampus</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/common.js"></script>
<script>
let allSlots = [];

async function loadStats() {
  const res = await fetch('/api/admin/dashboard', { credentials: 'include' });
  const s = await res.json();
  document.getElementById('sTotal').textContent = s.totalSlot;
  document.getElementById('sKosong').textContent = s.kosong;
  document.getElementById('sTerisi').textContent = s.terisi;
  document.getElementById('sBooked').textContent = s.booked;
  document.getElementById('sUser').textContent = s.totalUser;
  document.getElementById('sKunjungan').textContent = s.kunjunganHariIni;
  document.getElementById('sSedangParkir').textContent = s.sedangParkir;
}

async function loadSlots() {
  const res = await fetch('/api/slots', { credentials: 'include' });
  const json = await res.json();
  allSlots = json.slots;
  renderMap();
}

function renderMap() {
  const zones = {};
  allSlots.forEach(s => {
    if (!zones[s.zona_nama]) zones[s.zona_nama] = { lokasi: s.zona_lokasi, slots: [] };
    zones[s.zona_nama].slots.push(s);
  });
  document.getElementById('mapArea').innerHTML = Object.entries(zones).map(([nama, z]) => `
    <div class="zone-block">
      <div class="zone-title"><span>${nama} · ${z.lokasi}</span></div>
      <div class="slot-grid">
        ${z.slots.map(s => `
          <div class="slot-cell ${s.status}" id="slot-${s.id}" onclick="openSlotMenu(${s.id})" style="cursor:pointer;" title="Klik untuk ubah status · ${s.device_id}">
            <div class="dot"></div><div>${s.kode_slot}</div><div class="cm">${Math.round(s.jarak_cm)}cm</div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

async function openSlotMenu(id) {
  const slot = allSlots.find(s => s.id === id);
  const pilihan = ['kosong', 'terisi', 'booked', 'maintenance'];
  const baru = prompt(`Ubah status slot ${slot.kode_slot} (saat ini: ${slot.status})\nPilihan: ${pilihan.join(', ')}`, slot.status);
  if (!baru || !pilihan.includes(baru)) return;
  const res = await fetch(`/api/slots/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
    body: JSON.stringify({ status: baru })
  });
  if (res.ok) showToast('Status Diperbarui', `Slot ${slot.kode_slot} kini ${statusLabel(baru)}.`, 'info');
}

function updateOneSlot(slot) {
  const idx = allSlots.findIndex(s => s.id === slot.id);
  if (idx >= 0) allSlots[idx] = { ...allSlots[idx], ...slot };
  const el = document.getElementById(`slot-${slot.id}`);
  if (el) { el.className = `slot-cell ${slot.status}`; el.style.cursor='pointer'; el.querySelector('.cm').textContent = `${Math.round(slot.jarak_cm)}cm`; }
  loadStats();
}

(async () => {
  await ensureAuth('petugas');
  mountShell('Dashboard Admin', 'Pantauan kondisi parkir kampus & kelola status slot secara langsung.', `
    <div class="grid grid-4" style="margin-bottom:20px;">
      <div class="card stat-card"><div class="num" id="sTotal">–</div><div class="lbl">Total Slot</div></div>
      <div class="card stat-card"><div class="num" id="sKosong">–</div><div class="lbl">Kosong</div><span class="tag tag-green">Live</span></div>
      <div class="card stat-card"><div class="num" id="sTerisi">–</div><div class="lbl">Terisi</div><span class="tag tag-red">Live</span></div>
      <div class="card stat-card"><div class="num" id="sBooked">–</div><div class="lbl">Dibooking</div><span class="tag tag-amber">Live</span></div>
    </div>
    <div class="grid grid-3" style="margin-bottom:20px;">
      <div class="card stat-card"><div class="num" id="sUser">–</div><div class="lbl">Total Pengguna Terdaftar</div></div>
      <div class="card stat-card"><div class="num" id="sKunjungan">–</div><div class="lbl">Kunjungan Hari Ini</div></div>
      <div class="card stat-card"><div class="num" id="sSedangParkir">–</div><div class="lbl">Sedang Parkir Sekarang</div></div>
    </div>
    <div class="card">
      <h3>Peta & Kelola Status Slot <small>klik slot untuk ubah status manual</small></h3>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Kosong</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Terisi</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Dibooking</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8791A6"></div>Maintenance</div>
      </div>
      <div id="mapArea"></div>
    </div>
  `);
  await loadStats();
  await loadSlots();
  initSocket(updateOneSlot);
})();
</script>
</body>
</html>
